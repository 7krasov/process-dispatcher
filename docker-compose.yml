services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./crates/dispatcher/db/other_scripts/create_database.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 5s
      timeout: 3s
      retries: 10

  process_dispatcher:
    restart: no
    container_name: process_dispatcher
    build:
      context: .
      dockerfile: crates/dispatcher/ops/docker/dispatcher.coding.Dockerfile
    volumes:
      - ".:/var/app"
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/var/app/docker-target
    working_dir: /var/app
    environment:
      - CARGO_TARGET_DIR=/var/app/docker-target
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
      - MVP_DATABASE_URL=mysql://root:password@mysql:3306/mvp
      - PD_DATABASE_URL=mysql://root:password@mysql:3306/process_dispatcher
    ports:
      - "8089:8089"
    command: /var/app/crates/dispatcher/ops/docker/entrypoint.sh
    depends_on:
      mysql:
        condition: service_healthy

  process_supervisor:
    restart: no
    container_name: process_supervisor
    build:
      context: .
      dockerfile: crates/supervisor/ops/docker/supervisor.coding.Dockerfile
    volumes:
      - ".:/var/app"
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/var/app/docker-target
    working_dir: /var/app
    environment:
      - CARGO_TARGET_DIR=/var/app/docker-target
      - HTTP_PORT=8090
      - HOST_NAME=process_supervisor
    ports:
      - "8090:8090"
    command: cargo run --bin process_supervisor

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  mysql-data:
